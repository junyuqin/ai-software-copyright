version: '3.8'

# 慧学通 Docker Compose 编排文件
# 功能：三服务编排 (SQLite/backend/frontend)、健康检查、日志轮转
# 申报映射：操作简单易用/可复现/完整性

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: huixuetong-backend
    restart: unless-stopped
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-hui-xue-tong-secret-key}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - BAIDU_API_KEY=${BAIDU_API_KEY}
      - BAIDU_SECRET_KEY=${BAIDU_SECRET_KEY}
      - SQLITE_DB_PATH=/app/data/huixuetong.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WARNING_RULES_PATH=/app/data/warning_rules.json
    volumes:
      # 挂载 SQLite 数据目录
      - backend_data:/app/data
      # 挂载预警规则配置
      - ../../data/warning_rules.json:/app/data/warning_rules.json:ro
    depends_on: {}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - huixuetong-network
    expose:
      - "5000"

  # ==================== 前端服务 (Nginx) ====================
  frontend:
    image: nginx:alpine
    container_name: huixuetong-frontend
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      # 挂载 Nginx 配置
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # 挂载前端静态文件
      - ../frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "local"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - huixuetong-network

# ==================== 网络配置 ====================
networks:
  huixuetong-network:
    driver: bridge
    name: huixuetong-network

# ==================== 数据卷配置 ====================
volumes:
  backend_data:
    driver: local
    name: huixuetong-backend-data
